<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EyeBreak</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="break-body">
    <section class="break-card">
      <div class="badge">Break time</div>
      <h1>Look away from the screen</h1>
      <p>Pick something about 20 feet away. Relax your face. Blink slowly.</p>
      <div class="break-count" id="breakCount">20</div>
      <div class="controls centered">
        <button id="doneBtn" class="primary">Done</button>
        <button id="skipBtn">Skip</button>
      </div>
    </section>
    <script src="sounds.js"></script>
    <script src="break.js"></script>
  </body>
</html>
